<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock Love Story 💖</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:sans-serif;
background:radial-gradient(circle at top, #ff4f81, #1a1a2e);
color:white;
overflow:hidden;
}

/* floating glow */
body::before{
content:"💖 💕 💖 💕 💖 💕";
position:absolute;
font-size:30px;
opacity:0.08;
animation:float 12s linear infinite;
white-space:nowrap;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-100vh);}
}

/* title */
h1{
text-shadow:0 0 10px #ff4f81, 0 0 20px #ff4f81;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{transform:scale(1.05);}
}

/* box */
.box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
text-align:center;
width:80%;
max-width:300px;
}

button{
background:#ff4f81;
border:none;
padding:10px 20px;
border-radius:10px;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 15px #ff4f81;
}
</style>

</head>

<body>

<h1>🔐 Unlock Our Love Story</h1>

<div class="box">
    <h2>Ready? 💖</h2>
    <button onclick="unlockStory()">Unlock ❤️</button>
</div>

<!-- 🎧 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="music/bg.mp3" type="audio/mp3">
</audio>

<script>
document.body.addEventListener('click', function () {
    document.getElementById('bgMusic').play();
}, { once: true });
</script>

<script src="js/script.js"></script>

</body>
</html>
