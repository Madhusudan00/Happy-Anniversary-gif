<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock Love Story 💖</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:sans-serif;
background:radial-gradient(circle at top, #ff4f81, #1a1a2e);
color:white;
overflow:hidden;
}

/* animated background hearts */
body::before{
content:"💖 💕 💖 💕 💖 💕 💖 💕";
position:absolute;
font-size:28px;
opacity:0.07;
white-space:nowrap;
animation:float 14s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-100vh);}
}

/* soft glow overlay */
body::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 60%);
pointer-events:none;
}

/* title */
h1{
font-size:24px;
text-shadow:0 0 10px #ff4f81, 0 0 25px #ff4f81;
animation:pulse 2s infinite ease-in-out;
z-index:2;
}

@keyframes pulse{
50%{transform:scale(1.05);}
}

/* glass box */
.box{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
text-align:center;
width:85%;
max-width:320px;
box-shadow:0 0 25px rgba(255,255,255,0.15);
animation:fadeIn 1s ease;
z-index:2;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.8);}
to{opacity:1; transform:scale(1);}
}

/* subtitle */
.box h2{
font-weight:normal;
opacity:0.9;
}

/* button */
button{
background:linear-gradient(90deg,#ff4f81,#ffcc70);
border:none;
padding:12px 25px;
border-radius:30px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(255,255,255,0.2);
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px #ff4f81;
}

/* floating sparkle effect */
.sparkle{
position:absolute;
font-size:20px;
animation:floatSpark 6s infinite ease-in-out;
opacity:0.6;
}

@keyframes floatSpark{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}
</style>

</head>

<body>

<h1>🔐 Unlock Our Love Story</h1>

<div class="box">
    <h2>Ready? 💖</h2>
    <button onclick="unlockStory()">Unlock ❤️</button>
</div>

<!-- floating sparkles -->
<div class="sparkle" style="top:20%;left:10%">✨</div>
<div class="sparkle" style="top:60%;left:80%">💖</div>
<div class="sparkle" style="top:40%;left:70%">✨</div>

<!-- 🎧 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="music/bg.mp3" type="audio/mp3">
</audio>

<script>
document.body.addEventListener('click', function () {
    document.getElementById('bgMusic').play();
}, { once: true });
</script>

<script src="js/script.js"></script>

</body>
</html>
